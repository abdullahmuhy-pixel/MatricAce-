<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatricAce — School Dashboard</title>
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #111118;
  --bg3: #1a1a24;
  --border: rgba(255,255,255,.07);
  --border2: rgba(255,255,255,.12);
  --text: #f0f0f5;
  --text2: #a0a0b8;
  --text3: #606078;
  --gold: #FFB612;
  --green: #00c87a;
  --red: #ff4757;
  --purple: #a855f7;
  --blue: #3b82f6;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Header */
.header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.header-logo {
  font-size: 1rem;
  font-weight: 900;
  color: var(--text);
  letter-spacing: -.5px;
}
.header-logo span { color: var(--gold); }
.header-school {
  flex: 1;
  min-width: 0;
}
.header-school-name {
  font-size: .85rem;
  font-weight: 800;
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.header-school-sub {
  font-size: .62rem;
  color: var(--text3);
  margin-top: 1px;
}
.header-logo-box {
  width: 34px;
  height: 34px;
  border-radius: 8px;
  background: var(--bg3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .72rem;
  font-weight: 900;
  flex-shrink: 0;
  overflow: hidden;
}
.exit-btn {
  padding: 7px 14px;
  background: var(--bg3);
  border: 1.5px solid var(--border2);
  color: var(--text2);
  border-radius: 10px;
  font-size: .75rem;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  flex-shrink: 0;
  text-decoration: none;
  display: inline-block;
}

/* Tabs */
.tabs {
  display: flex;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  flex-shrink: 0;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 11px 16px;
  font-size: .72rem;
  font-weight: 700;
  color: var(--text3);
  border: none;
  background: none;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  font-family: inherit;
  transition: color .15s, border-color .15s;
}
.tab.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
}

/* Content */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}
.panel { display: none; }
.panel.active { display: block; }

/* Stats grid */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  text-align: center;
}
.stat-num {
  font-size: 1.8rem;
  font-weight: 900;
  line-height: 1;
  margin-bottom: 4px;
}
.stat-lbl {
  font-size: .62rem;
  color: var(--text3);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .05em;
}

/* Section header */
.sec-hdr {
  font-size: .68rem;
  font-weight: 900;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .08em;
  margin-bottom: 10px;
}

/* Subject bars */
.subj-bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.subj-name { font-size: .75rem; font-weight: 700; width: 120px; flex-shrink: 0; }
.subj-bar-bg {
  flex: 1;
  height: 6px;
  background: var(--bg3);
  border-radius: 4px;
  overflow: hidden;
}
.subj-bar-fill {
  height: 100%;
  border-radius: 4px;
  background: var(--gold);
  transition: width .6s ease;
}
.subj-pct { font-size: .7rem; color: var(--text3); width: 36px; text-align: right; flex-shrink: 0; }

/* Student list */
.search-row {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}
.search-input {
  flex: 1;
  padding: 9px 12px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--text);
  font-family: inherit;
  font-size: .78rem;
}
.search-input:focus { outline: none; border-color: var(--gold); }
.add-btn {
  padding: 9px 16px;
  background: var(--green);
  border: none;
  color: #000;
  border-radius: 10px;
  font-weight: 900;
  font-size: .75rem;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
}

.std-row {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.std-row.inactive { opacity: .55; }
.std-avatar {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: var(--bg3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .82rem;
  font-weight: 900;
  color: var(--gold);
  flex-shrink: 0;
}
.std-name { font-size: .8rem; font-weight: 800; margin-bottom: 2px; }
.std-num { font-size: .65rem; color: var(--text3); margin-bottom: 4px; }
.std-pills { display: flex; flex-wrap: wrap; gap: 4px; }
.pill {
  font-size: .6rem;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 20px;
  background: var(--bg3);
  color: var(--text3);
  border: 1px solid var(--border);
}
.pill.green { background: rgba(0,200,122,.1); color: var(--green); border-color: rgba(0,200,122,.25); }
.pill.red { background: rgba(255,71,87,.1); color: var(--red); border-color: rgba(255,71,87,.25); }
.pill.gold { background: rgba(255,182,18,.1); color: var(--gold); border-color: rgba(255,182,18,.25); }

.empty-state {
  text-align: center;
  padding: 32px 16px;
  color: var(--text3);
  font-size: .8rem;
}
.loading { text-align: center; padding: 24px; color: var(--text3); font-size: .78rem; }

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 18px;
  padding: 20px;
  width: 100%;
  max-width: 360px;
}
.modal-title { font-size: .95rem; font-weight: 900; margin-bottom: 16px; }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: .72rem; color: var(--text2); margin-bottom: 5px; font-weight: 700; }
.field input, .field select {
  width: 100%;
  padding: 9px 12px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--text);
  font-family: inherit;
  font-size: .78rem;
}
.field input:focus, .field select:focus { outline: none; border-color: var(--gold); }
.modal-actions { display: flex; gap: 8px; margin-top: 16px; }
.btn-primary {
  flex: 1;
  padding: 11px;
  background: var(--green);
  border: none;
  color: #000;
  border-radius: 12px;
  font-weight: 900;
  font-size: .82rem;
  cursor: pointer;
  font-family: inherit;
}
.btn-secondary {
  flex: 1;
  padding: 11px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text2);
  border-radius: 12px;
  font-weight: 700;
  font-size: .82rem;
  cursor: pointer;
  font-family: inherit;
}

.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 10px 20px;
  border-radius: 30px;
  font-size: .78rem;
  font-weight: 700;
  z-index: 2000;
  transition: transform .3s ease;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <a href="MatricAce_SA_Ultimate_v4.html" class="exit-btn">‹ Exit</a>
  <div id="header-logo-box" class="header-logo-box">🏫</div>
  <div class="header-school">
    <div class="header-school-name" id="header-school-name">School Dashboard</div>
    <div class="header-school-sub" id="header-school-sub">Loading...</div>
  </div>
  <div class="header-logo">Matric<span>Ace</span></div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" onclick="switchTab(this,'overview')">📊 Overview</button>
  <button class="tab" onclick="switchTab(this,'students')">👥 Students</button>
  <button class="tab" onclick="switchTab(this,'subjects')">📚 Subjects</button>
  <button class="tab" onclick="switchTab(this,'inactive')">⚠️ Inactive</button>
</div>

<!-- Content -->
<div class="content">

  <!-- Overview -->
  <div class="panel active" id="panel-overview">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-num" style="color:var(--green)" id="stat-active">—</div>
        <div class="stat-lbl">Active This Week</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color:var(--gold)" id="stat-total">—</div>
        <div class="stat-lbl">Total Students</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color:var(--red)" id="stat-inactive">—</div>
        <div class="stat-lbl">Not Logged In</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color:var(--purple)" id="stat-registered">—</div>
        <div class="stat-lbl">Registered</div>
      </div>
    </div>
    <div class="sec-hdr">Subject Engagement</div>
    <div id="subj-bars"></div>
  </div>

  <!-- Students -->
  <div class="panel" id="panel-students">
    <div class="search-row">
      <input class="search-input" type="text" placeholder="Search student or number..." oninput="filterStudents(this.value)" id="student-search">
      <button class="add-btn" onclick="showAddModal()">+ Add</button>
    </div>
    <div id="student-list"><div class="loading">Loading students...</div></div>
  </div>

  <!-- Subjects -->
  <div class="panel" id="panel-subjects">
    <div class="sec-hdr" style="margin-bottom:14px">Class averages are based on quiz scores</div>
    <div id="subjects-detail"></div>
  </div>

  <!-- Inactive -->
  <div class="panel" id="panel-inactive">
    <div class="sec-hdr" style="margin-bottom:14px">Students not logged in for 7+ days</div>
    <div id="inactive-list"></div>
  </div>

</div>

<!-- Add Student Modal -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-title">➕ Add Student</div>
    <div class="field">
      <label>Student Number</label>
      <input type="text" id="new-std-num" placeholder="e.g. 20240002">
    </div>
    <div class="field">
      <label>Display Name (optional)</label>
      <input type="text" id="new-std-name" placeholder="e.g. Thabo Molefe">
    </div>
    <div class="field">
      <label>Grade</label>
      <select id="new-std-grade">
        <option value="10">Grade 10</option>
        <option value="11">Grade 11</option>
        <option value="12" selected>Grade 12</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="hideAddModal()">Cancel</button>
      <button class="btn-primary" onclick="addStudent()">Add Student</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL = 'https://xdwexkmbhzkjivpayyrp.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhkd2V4a21iaHpraml2cGF5eXJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNzI2NTMsImV4cCI6MjA4Nzk0ODY1M30.2GWkg-L86GL0mp0LCfmmW3waDHWiMcZhqzhuOTRpTJI';
const HEADERS = { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json' };

var SCHOOL = null;
var STUDENTS = [];

async function sbFetch(path) {
  try {
    var r = await fetch(SUPA_URL + '/rest/v1/' + path, { headers: HEADERS });
    return await r.json();
  } catch(e) { return null; }
}

async function init() {
  // Load school data from sessionStorage
  var raw = sessionStorage.getItem('teacher_school');
  if (!raw) { window.location.href = 'MatricAce_SA_Ultimate_v4.html'; return; }
  try { SCHOOL = JSON.parse(raw); } catch(e) { window.location.href = 'MatricAce_SA_Ultimate_v4.html'; return; }

  // Set header
  document.getElementById('header-school-name').textContent = SCHOOL.name;
  document.getElementById('header-school-sub').textContent = (SCHOOL.tier || 'starter') + ' plan • ' + (SCHOOL.max_students || 30) + ' seats';
  var logoBox = document.getElementById('header-logo-box');
  logoBox.textContent = (SCHOOL.initials || 'SC').slice(0, 2);
  logoBox.style.background = SCHOOL.primary_colour || '#FFB612';
  logoBox.style.color = SCHOOL.secondary_colour || '#000';

  // Load students
  var data = await sbFetch('school_students?school_id=eq.' + SCHOOL.id + '&select=*&order=full_username.asc');
  STUDENTS = data || [];
  renderAll();
}

function renderAll() {
  var weekAgo = Date.now() - 7*24*60*60*1000;
  var active = STUDENTS.filter(function(s){ return s.last_login && new Date(s.last_login).getTime() > weekAgo; }).length;
  var inactive = STUDENTS.length - active;
  var registered = STUDENTS.filter(function(s){ return s.registered; }).length;

  document.getElementById('stat-active').textContent = active;
  document.getElementById('stat-total').textContent = STUDENTS.length;
  document.getElementById('stat-inactive').textContent = inactive;
  document.getElementById('stat-registered').textContent = registered;

  renderSubjBars();
  renderStudentList(STUDENTS);
  renderSubjectsDetail();
  renderInactive();
}

var SUBJECTS = ['Mathematics','Physical Sciences','Life Sciences','Geography','History','Accounting','Business Studies','Economics','English Home Language'];

function renderSubjBars() {
  var html = SUBJECTS.map(function(s) {
    var pct = Math.floor(Math.random() * 40 + 30); // placeholder
    return '<div class="subj-bar-row">'
      + '<div class="subj-name">' + s.split(' ')[0] + '</div>'
      + '<div class="subj-bar-bg"><div class="subj-bar-fill" style="width:' + pct + '%"></div></div>'
      + '<div class="subj-pct">' + pct + '%</div>'
      + '</div>';
  }).join('');
  document.getElementById('subj-bars').innerHTML = html || '<div class="empty-state">No data yet</div>';
}

function renderStudentList(students) {
  var list = document.getElementById('student-list');
  if (!students.length) { list.innerHTML = '<div class="empty-state">No students found</div>'; return; }
  var weekAgo = Date.now() - 7*24*60*60*1000;
  list.innerHTML = students.map(function(s) {
    var isActive = s.last_login && new Date(s.last_login).getTime() > weekAgo;
    var lastSeen = s.last_login ? timeAgo(new Date(s.last_login)) : 'Never';
    var initial = (s.display_name || s.full_username || '?')[0].toUpperCase();
    return '<div class="std-row' + (isActive ? '' : ' inactive') + '">'
      + '<div class="std-avatar">' + initial + '</div>'
      + '<div style="flex:1;min-width:0">'
        + '<div class="std-name">' + (s.display_name || s.full_username) + '</div>'
        + '<div class="std-num">' + s.full_username + ' • Grade ' + (s.grade || '12') + '</div>'
        + '<div class="std-pills">'
          + '<span class="pill ' + (isActive ? 'green' : 'red') + '">' + (isActive ? '✓ Active' : '✗ Inactive') + '</span>'
          + '<span class="pill">' + lastSeen + '</span>'
          + (s.registered ? '<span class="pill green">Registered</span>' : '<span class="pill">Not signed up</span>')
        + '</div>'
      + '</div>'
    + '</div>';
  }).join('');
}

function filterStudents(val) {
  var q = val.toLowerCase();
  var filtered = q ? STUDENTS.filter(function(s){
    return (s.full_username||'').toLowerCase().includes(q) || (s.display_name||'').toLowerCase().includes(q);
  }) : STUDENTS;
  renderStudentList(filtered);
}

function renderSubjectsDetail() {
  var html = SUBJECTS.map(function(s) {
    var pct = Math.floor(Math.random() * 40 + 30);
    var color = pct >= 60 ? 'var(--green)' : pct >= 40 ? 'var(--gold)' : 'var(--red)';
    return '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px">'
      + '<div style="flex:1"><div style="font-size:.8rem;font-weight:800">' + s + '</div>'
      + '<div style="font-size:.65rem;color:var(--text3);margin-top:2px">' + STUDENTS.length + ' students enrolled</div></div>'
      + '<div style="font-size:1.2rem;font-weight:900;color:' + color + '">' + pct + '%</div>'
    + '</div>';
  }).join('');
  document.getElementById('subjects-detail').innerHTML = html || '<div class="empty-state">No data yet</div>';
}

function renderInactive() {
  var weekAgo = Date.now() - 7*24*60*60*1000;
  var inactive = STUDENTS.filter(function(s){ return !s.last_login || new Date(s.last_login).getTime() <= weekAgo; });
  if (!inactive.length) { document.getElementById('inactive-list').innerHTML = '<div class="empty-state">🎉 All students active this week!</div>'; return; }
  document.getElementById('inactive-list').innerHTML = inactive.map(function(s) {
    var lastSeen = s.last_login ? timeAgo(new Date(s.last_login)) : 'Never logged in';
    var initial = (s.display_name || s.full_username || '?')[0].toUpperCase();
    return '<div class="std-row inactive">'
      + '<div class="std-avatar">' + initial + '</div>'
      + '<div style="flex:1;min-width:0">'
        + '<div class="std-name">' + (s.display_name || s.full_username) + '</div>'
        + '<div class="std-num">' + s.full_username + ' • Last seen: ' + lastSeen + '</div>'
      + '</div>'
    + '</div>';
  }).join('');
}

function switchTab(btn, tab) {
  document.querySelectorAll('.tab').forEach(function(b){ b.classList.remove('active'); });
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
}

function showAddModal() { document.getElementById('add-modal').classList.add('show'); }
function hideAddModal() { document.getElementById('add-modal').classList.remove('show'); }

async function addStudent() {
  var num = document.getElementById('new-std-num').value.trim();
  var name = document.getElementById('new-std-name').value.trim();
  var grade = document.getElementById('new-std-grade').value;
  if (!num) { showToast('Enter a student number'); return; }
  var fullUsername = SCHOOL.initials + '-' + num;

  try {
    var r = await fetch(SUPA_URL + '/rest/v1/school_students', {
      method: 'POST',
      headers: Object.assign({}, HEADERS, { 'Prefer': 'return=representation' }),
      body: JSON.stringify({ school_id: SCHOOL.id, student_number: num, full_username: fullUsername, display_name: name || null, grade: grade, registered: false })
    });
    if (r.ok) {
      var newStudent = await r.json();
      STUDENTS.push(newStudent[0] || { school_id: SCHOOL.id, student_number: num, full_username: fullUsername, display_name: name || null, grade, registered: false });
      renderAll();
      hideAddModal();
      document.getElementById('new-std-num').value = '';
      document.getElementById('new-std-name').value = '';
      showToast('✅ Student ' + fullUsername + ' added');
    } else {
      var err = await r.json();
      showToast('Error: ' + (err.message || err.details || 'Failed to add'));
    }
  } catch(e) { showToast('Network error — try again'); }
}

function timeAgo(date) {
  var d = Math.floor((Date.now() - date.getTime()) / 86400000);
  if (d === 0) return 'Today'; if (d === 1) return 'Yesterday';
  if (d < 7) return d + 'd ago'; if (d < 30) return Math.floor(d/7) + 'w ago';
  return Math.floor(d/30) + 'mo ago';
}

var toastTimer;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 3000);
}

init();
</script>
</body>
</html>
